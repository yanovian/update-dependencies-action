name: CI

on:
  pull_request:
  push:
    branches: [master]

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'pnpm'

      - name: Install dependencies
        run: make install

      - name: Run full verification
        run: make verify

      - name: Check that dist/ matches source
        run: |
          if ! git diff --exit-code -- dist/; then
            echo "dist/ is out of date. Run 'make package' and commit the result." >&2
            exit 1
          fi
