name: Update Dependencies (non-breaking)

# Runs every Monday at 02:00 UTC and keeps every package within its current major version.
# Pair this with update-dependencies-breaking.yml, which handles major version jumps on a
# slower monthly cadence, so day-to-day updates stay small and frequent while breaking changes
# get reviewed deliberately, once a month.
on:
  schedule:
    - cron: '0 2 * * 1'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: yanovian/update-dependencies-action@v1
        with:
          update-strategy: non-breaking
          check-commands: |
            - npm ci
            - npm test
            - npm run lint
          create-pull-request: true
          branch-name: update-dependencies/non-breaking
          github-token: ${{ secrets.GITHUB_TOKEN }}
