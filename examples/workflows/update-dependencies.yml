name: Update Dependencies

on:
  schedule:
    - cron: '0 6 * * 1' # every Monday at 06:00 UTC
  workflow_dispatch:
    inputs:
      update-strategy:
        description: 'non-breaking or breaking'
        required: false
        default: 'non-breaking'

permissions:
  contents: write
  pull-requests: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: yanovian/github-actions-update-dependencies@v1
        with:
          update-strategy: ${{ inputs.update-strategy || 'non-breaking' }}
          commands: |
            npm ci
            npm test
            npm run lint
          create-pull-request: true
          github-token: ${{ secrets.GITHUB_TOKEN }}
